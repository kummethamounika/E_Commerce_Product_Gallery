<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ShopSphere | Product Details</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <!-- ================= HEADER ================= -->

    <header>

        <nav class="navbar">

            <div class="logo">

                <i class="fa-solid fa-store"></i>

                <span>ShopSphere</span>

            </div>

            <ul class="nav-links">

                <li><a href="index.html">Home</a></li>

                <li><a href="products.html">Products</a></li>

                <li><a href="cart.html">Cart</a></li>

                <li><a href="wishlist.html">Wishlist</a></li>

                <li><a href="about.html">About</a></li>

            </ul>

        </nav>

    </header>

    <!-- ================= PRODUCT DETAILS ================= -->

    <section class="product-details">

        <div class="product-image">

            <img id="productImage" src="images/headphones.jpg" alt="Product Image">

        </div>

        <div class="product-info">

            <h1 id="productName">Product Name</h1>

            <p id="productDescription">

                Product description will appear here.

            </p>

            <h2 class="price" id="productPrice">$0</h2>

            <p id="productRating">
                ⭐⭐⭐⭐⭐ (4.8/5)
            </p>

            <div class="quantity-box">

                <label for="quantity">
                    Quantity
                </label>

                <input
                    type="number"
                    id="quantity"
                    value="1"
                    min="1">

            </div>

            <div class="action-buttons">

                <button id="addCartBtn">

                    <i class="fa-solid fa-cart-shopping"></i>

                    Add to Cart

                </button>

                <button id="wishlistBtn">

                    <i class="fa-solid fa-heart"></i>

                    Add to Wishlist

                </button>

            </div>

        </div>

    </section>

    <!-- ================= RELATED PRODUCTS ================= -->

    <section class="featured-products">

        <h2>Related Products</h2>

        <div id="relatedProducts" class="product-grid">

            <!-- JavaScript will load related products -->

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer>

        <div class="footer-content">

            <h2>ShopSphere</h2>

            <p>

                Your trusted online shopping destination.

            </p>

            <p>

                © 2026 ShopSphere. All Rights Reserved.

            </p>

        </div>

    </footer>

    <script src="script.js"></script>

</body>

</html>
